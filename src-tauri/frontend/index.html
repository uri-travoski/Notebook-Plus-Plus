<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Notebook++</title>
    <style>
      body { font-family: system-ui, sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; background: #0f172a; color: #94a3b8; }
      .spinner { width: 32px; height: 32px; border: 3px solid #334155; border-top-color: #0b7c6e; border-radius: 50%; animation: spin 0.8s linear infinite; margin-right: 12px; }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div class="spinner"></div>
    <span>Starting Notebook++…</span>
    <script>
      // Poll for the Nitro server, then redirect
      const APP_PORT = 3940;
      const check = () => {
        fetch(`http://localhost:${APP_PORT}/`, { mode: 'no-cors' })
          .then(() => { window.location.href = `http://localhost:${APP_PORT}/`; })
          .catch(() => setTimeout(check, 1000));
      };
      check();
    </script>
  </body>
</html>
