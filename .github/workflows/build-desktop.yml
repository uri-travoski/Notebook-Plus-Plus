name: Build Desktop App

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}

      - name: Install dependencies
        run: npm ci

      - name: Download pg0 binary for Windows
        run: node scripts/download-pg0-binaries.mjs windows-x86_64
        shell: bash

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_OPTIONS: --max-old-space-size=4096
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Notebook++ ${{ github.ref_name }}"
          releaseBody: "Desktop app release"
          releaseDraft: true
          prerelease: false

      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: notebookpp-windows-msi
          path: src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: warn

      - name: Upload NSIS artifact
        uses: actions/upload-artifact@v4
        with:
          name: notebookpp-windows-nsis
          path: src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: warn

  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}

      - name: Install dependencies
        run: npm ci

      - name: Download pg0 binary for Linux
        run: node scripts/download-pg0-binaries.mjs linux-x86_64

      - name: Build Tauri app
        run: npx tauri build
        env:
          NODE_OPTIONS: --max-old-space-size=4096

      - name: Upload deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: notebookpp-linux-deb
          path: src-tauri/target/release/bundle/deb/*.deb

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: notebookpp-linux-appimage
          path: src-tauri/target/release/bundle/appimage/*.AppImage

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}

      - name: Install dependencies
        run: npm ci

      - name: Download pg0 binary for macOS
        run: node scripts/download-pg0-binaries.mjs macos-arm64

      - name: Build Tauri app
        run: npx tauri build
        env:
          NODE_OPTIONS: --max-old-space-size=4096

      - name: Upload dmg artifact
        uses: actions/upload-artifact@v4
        with:
          name: notebookpp-macos-dmg
          path: src-tauri/target/release/bundle/dmg/*.dmg
